<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TACLAR Admin V10.6</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#061416;color:white}
.app{max-width:430px;margin:auto;padding:16px;min-height:100vh}
.wide{max-width:980px}
.badge{float:right;padding:8px 12px;border-radius:20px;background:rgba(20,184,166,.18);border:1px solid rgba(20,184,166,.5);color:#5eead4;font-weight:bold;font-size:13px}
h1{margin:0;font-size:32px}.subtitle,.muted{color:#9ca3af}.status{color:#5eead4;font-size:13px;margin-bottom:14px;min-height:18px}
.card{background:#102629;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:16px;margin-bottom:14px}
label{color:#9ca3af;font-size:13px;display:block;margin-bottom:6px}
select,input{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:#061416;color:white;font-size:17px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.box{background:rgba(255,255,255,.06);border-radius:18px;padding:16px 10px;text-align:center;border:1px solid rgba(255,255,255,.08)}
.box small{display:block;color:#9ca3af;margin-bottom:6px;font-size:12px}.box strong{font-size:24px}.green{color:#5eead4}.yellow{color:#facc15}
button{width:100%;min-height:58px;border:none;border-radius:18px;font-size:18px;font-weight:bold;background:#14b8a6;color:#05201f;cursor:pointer;margin-bottom:10px}
.btn-yellow{background:#facc15;color:#111827}.btn-dark{background:rgba(255,255,255,.08);color:white;border:1px solid rgba(255,255,255,.12)}.btn-red{background:rgba(239,68,68,.18);color:#fecaca;border:1px solid rgba(239,68,68,.4)}
.seatMap{display:grid;gap:12px;margin-top:8px}.frontRow{display:grid;grid-template-columns:1fr 1fr;gap:12px}.backRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.driverSeat{background:#facc15;border-radius:18px;min-height:86px;display:flex;align-items:center;justify-content:center;text-align:center;color:#111827;font-weight:bold}
.seatBtn{min-height:86px;margin-bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.15}.seatBtn .code{font-size:24px}.seatBtn .amount{font-size:13px;margin-top:6px}
.seatFree{background:rgba(255,255,255,.08);color:white;border:1px solid rgba(255,255,255,.14)}.seatBusy{background:#14b8a6;color:#05201f;border:1px solid rgba(255,255,255,.18)}
.fareGrid{display:none;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.fareGrid button{margin-bottom:0;min-height:54px}
.seatPanel{display:none;margin-top:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:12px}.adjustGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.list{display:flex;flex-direction:column;gap:8px;max-height:210px;overflow-y:auto}.row{display:flex;justify-content:space-between;background:rgba(255,255,255,.06);padding:12px;border-radius:14px;font-size:14px;border:1px solid rgba(255,255,255,.06)}.row b{color:#5eead4}
.footer{display:grid;grid-template-columns:1fr 1fr;gap:12px}.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:10;padding:18px;align-items:center;justify-content:center}.modal{width:100%;max-width:390px;background:#102629;border-radius:24px;padding:20px;border:1px solid rgba(255,255,255,.15);max-height:88vh;overflow:auto}
.incidentAlert{display:none;background:rgba(239,68,68,.16);border:1px solid rgba(239,68,68,.45);color:#fecaca;border-radius:18px;padding:14px;margin-bottom:14px;font-weight:bold}.incidentAlert small{display:block;color:#fca5a5;margin-top:4px;font-weight:normal}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px}th,td{border-bottom:1px solid rgba(255,255,255,.12);padding:10px;text-align:left}th{color:#94a3b8}
.statuspill{display:inline-block;padding:6px 10px;border-radius:999px;font-weight:bold;font-size:12px}.pillgreen{background:rgba(34,197,94,.18);color:#86efac}.pillorange{background:rgba(250,204,21,.18);color:#fde68a}.pillgray{background:rgba(148,163,184,.18);color:#cbd5e1}
@media(max-width:700px){.wide{max-width:430px}.grid2{grid-template-columns:1fr 1fr}table{font-size:12px}}
</style></head><body><div class="app wide"><div class="badge">ADMIN V10.6</div><h1>TACLAR Admin</h1><div class="subtitle">Comptabilité / Direction — Groupage</div><div class="card"><button onclick="render()">Actualiser</button><button class="btn-red" onclick="clearData()">Effacer rapports test</button></div><div class="summary"><div class="box"><small>Sessions</small><strong id="sCount">0</strong></div><div class="box"><small>Passagers</small><strong id="pCount">0</strong></div><div class="box"><small>Montant</small><strong class="yellow" id="tSum">0 FCFA</strong></div><div class="box"><small>Commission TACLAR</small><strong id="cSum">0 FCFA</strong></div></div><div class="card"><h2>Rapport des sessions</h2><table><thead><tr>
<th>Date</th><th>Heure</th><th>Chauffeur</th><th>Plaque</th><th>Axe</th><th>Passagers</th>
<th>Montant app</th><th>Cash réel</th><th>Écart</th><th>Justification</th>
<th>Commission TACLAR</th><th>Net</th><th>Incidents</th><th>Action</th>
</tr></thead><tbody id="rows"></tbody></table></div></div><script>
function money(n){return String(n||0).replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' FCFA'}
function getSessions(){return JSON.parse(localStorage.getItem('taclar_sessions')||'[]')}
function saveSessions(s){localStorage.setItem('taclar_sessions',JSON.stringify(s))}
function render(){
  var s=getSessions();
  var rows=document.getElementById('rows');
  rows.innerHTML='';
  var p=0,t=0,c=0;
  if(s.length===0){
    rows.innerHTML='<tr><td colspan="14">Aucune session enregistrée.</td></tr>';
  }
  s.slice().reverse().forEach(function(x,revIndex){
    var originalIndex=s.length-1-revIndex;
    p+=Number(x.passengers||0); t+=Number(x.total||0); c+=Number(x.commission||0);
    var tr=document.createElement('tr');
    tr.innerHTML=
      '<td>'+ (x.date||'') +'</td>'+
      '<td>'+ (x.time||'') +'</td>'+
      '<td>'+ (x.driver||'---') +'</td>'+
      '<td>'+ (x.plate||'---') +'</td>'+
      '<td>'+ (x.route||'---') +'</td>'+
      '<td>'+ (x.passengers||0) +'</td>'+
      '<td>'+ money(x.total) +'</td>'+
      '<td>'+ money(x.cashReal||0) +'</td>'+
      '<td>'+ money(Math.abs(x.gap||0)) +'</td>'+
      '<td>'+ (x.justification||'') +'</td>'+
      '<td>'+ money(x.commission) +'</td>'+
      '<td>'+ money(x.net) +'</td>'+
      '<td>'+ ((x.incidents||[]).length) +'</td>'+
      '<td><button class="btn-red" style="min-height:38px;font-size:12px" onclick="deleteSession('+originalIndex+')">Supprimer</button></td>';
    rows.appendChild(tr);
  });
  document.getElementById('sCount').textContent=s.length;
  document.getElementById('pCount').textContent=p;
  document.getElementById('tSum').textContent=money(t);
  document.getElementById('cSum').textContent=money(c);
}
function deleteSession(i){
  var s=getSessions();
  var item=s[i];
  if(!item)return;
  if(confirm('Supprimer cette ligne Admin ?')){
    s.splice(i,1);
    saveSessions(s);
    render();
  }
}
function clearData(){
  if(confirm('Effacer tous les rapports test ?')){
    localStorage.removeItem('taclar_sessions');
    render();
  }
}
render();
</script></body></html>
