<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TACLAR Admin V10.8</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#061416;color:white}
.app{max-width:980px;margin:auto;padding:14px;min-height:100vh}
.badge{float:right;padding:8px 12px;border-radius:20px;background:rgba(20,184,166,.18);border:1px solid rgba(20,184,166,.5);color:#5eead4;font-weight:bold;font-size:13px}
h1{margin:0;font-size:32px}.subtitle,.muted{color:#9ca3af}
.card{background:#102629;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px;margin-bottom:12px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.box{background:rgba(255,255,255,.06);border-radius:16px;padding:12px 8px;text-align:center;border:1px solid rgba(255,255,255,.08)}
.box small{display:block;color:#9ca3af;margin-bottom:6px;font-size:12px}.box strong{font-size:22px}
button{min-height:42px;border:none;border-radius:14px;font-size:14px;font-weight:bold;background:#14b8a6;color:#05201f;cursor:pointer;padding:8px 12px}
.btn-red{background:rgba(239,68,68,.18);color:#fecaca;border:1px solid rgba(239,68,68,.4)}
.btn-dark{background:rgba(255,255,255,.08);color:white;border:1px solid rgba(255,255,255,.12)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;table-layout:auto}
th,td{border-bottom:1px solid rgba(255,255,255,.12);padding:8px;text-align:left;vertical-align:middle}
th{color:#94a3b8;font-size:12px}
a{color:#5eead4;font-weight:bold;text-decoration:none}
.detailBox{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px;margin:8px 0}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:10;padding:18px;align-items:center;justify-content:center}
.modal{width:100%;max-width:460px;background:#102629;border-radius:24px;padding:20px;border:1px solid rgba(255,255,255,.15);max-height:88vh;overflow:auto}
@media(max-width:700px){.app{max-width:430px;padding:10px}.summary{grid-template-columns:1fr 1fr}table{font-size:11px}th,td{padding:6px}}
</style></head>
<body>
<div class="app">
<div class="badge">ADMIN V10.8</div>
<h1>TACLAR Admin</h1>
<div class="subtitle">Comptabilité / Direction — Groupage</div>

<div class="card">
<button onclick="render()">Actualiser</button>
<button class="btn-red" onclick="clearData()">Effacer rapports test</button>
</div>

<div class="summary">
<div class="box"><small>Sessions</small><strong id="sCount">0</strong></div>
<div class="box"><small>Passagers</small><strong id="pCount">0</strong></div>
<div class="box"><small>Montant</small><strong id="tSum">0 FCFA</strong></div>
<div class="box"><small>Comm. TACLAR</small><strong id="cSum">0 FCFA</strong></div>
</div>

<div class="card">
<h2>Rapport des sessions</h2>
<table>
<thead><tr>
<th>Date</th><th>Début</th><th>Fin</th><th>Durée</th><th>Chauffeur</th><th>Plaque</th><th>Pass.</th><th>Montant</th><th>Comm.</th><th>Net</th><th>Inc.</th><th>Action</th>
</tr></thead>
<tbody id="rows"></tbody>
</table>
</div>
</div>

<div class="modal-bg" id="detailModal"><div class="modal">
<h2>Détail session</h2>
<div id="detailContent"></div>
<button class="btn-dark" onclick="closeDetail()">Fermer</button>
</div></div>

<script>
var currentSessions=[];
function money(n){return String(n||0).replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' FCFA'}
function getSessions(){try{return JSON.parse(localStorage.getItem('taclar_sessions')||'[]')}catch(e){return []}}
function saveSessions(s){localStorage.setItem('taclar_sessions',JSON.stringify(s))}
function render(){
  var s=getSessions(); currentSessions=s;
  var rows=document.getElementById('rows'); rows.innerHTML='';
  var p=0,t=0,c=0;
  if(s.length===0) rows.innerHTML='<tr><td colspan="12">Aucune session enregistrée.</td></tr>';
  s.slice().reverse().forEach(function(x,revIndex){
    var i=s.length-1-revIndex;
    p+=Number(x.passengers||0); t+=Number(x.total||0); c+=Number(x.commission||0);
    var tr=document.createElement('tr');
    tr.innerHTML=
      '<td>'+(x.date||'')+'</td>'+
      '<td>'+(x.start||'--:--')+'</td>'+
      '<td>'+(x.end||x.time||'--:--')+'</td>'+
      '<td>'+(x.duration||'--')+'</td>'+
      '<td>'+(x.driver||'---')+'</td>'+
      '<td><a href="#" onclick="showDetail('+i+')">'+(x.plate||'---')+'</a></td>'+
      '<td>'+(x.passengers||0)+'</td>'+
      '<td>'+money(x.total)+'</td>'+
      '<td>'+money(x.commission)+'</td>'+
      '<td>'+money(x.net)+'</td>'+
      '<td>'+((x.incidents||[]).length)+'</td>'+
      '<td><button class="btn-red" onclick="deleteSession('+i+')">Supprimer</button></td>';
    rows.appendChild(tr);
  });
  document.getElementById('sCount').textContent=s.length;
  document.getElementById('pCount').textContent=p;
  document.getElementById('tSum').textContent=money(t);
  document.getElementById('cSum').textContent=money(c);
}
function showDetail(i){
  var x=currentSessions[i]; if(!x)return;
  var inc=(x.incidents||[]).map(function(a){return (a.time||'')+' - '+(a.reason||'')}).join('<br>') || 'Aucun';
  var html='';
  html+='<div class="detailBox"><b>Chauffeur :</b> '+(x.driver||'---')+'</div>';
  html+='<div class="detailBox"><b>Plaque :</b> '+(x.plate||'---')+'</div>';
  html+='<div class="detailBox"><b>Axe :</b> '+(x.route||'---')+'</div>';
  html+='<div class="detailBox"><b>Début :</b> '+(x.start||'--:--')+'</div>';
  html+='<div class="detailBox"><b>Fin :</b> '+(x.end||x.time||'--:--')+'</div>';
  html+='<div class="detailBox"><b>Durée :</b> '+(x.duration||'--')+'</div>';
  html+='<div class="detailBox"><b>Passagers :</b> '+(x.passengers||0)+'</div>';
  html+='<div class="detailBox"><b>Montant app :</b> '+money(x.total)+'</div>';
  html+='<div class="detailBox"><b>Cash réel :</b> '+money(x.cashReal||0)+'</div>';
  html+='<div class="detailBox"><b>Écart :</b> '+money(Math.abs(x.gap||0))+'</div>';
  html+='<div class="detailBox"><b>Justification :</b> '+(x.justification||'Aucune')+'</div>';
  html+='<div class="detailBox"><b>Incidents :</b><br>'+inc+'</div>';
  document.getElementById('detailContent').innerHTML=html;
  document.getElementById('detailModal').style.display='flex';
}
function closeDetail(){document.getElementById('detailModal').style.display='none'}
function deleteSession(i){
  var s=getSessions(); if(!s[i])return;
  if(confirm('Supprimer cette ligne Admin ?')){s.splice(i,1);saveSessions(s);render();}
}
function clearData(){
  if(confirm('Effacer tous les rapports test ?')){localStorage.removeItem('taclar_sessions');render();}
}
render();
</script>
</body></html>
