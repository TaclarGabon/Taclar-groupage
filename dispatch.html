<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TACLAR Dispatch V12.2.8</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#061416;color:white}
.app{max-width:980px;margin:auto;padding:14px;min-height:100vh}
.badge{float:right;padding:8px 12px;border-radius:20px;background:rgba(20,184,166,.18);border:1px solid rgba(20,184,166,.5);color:#5eead4;font-weight:bold;font-size:13px}
h1{margin:0;font-size:32px}.subtitle,.muted{color:#9ca3af}
.card{background:#102629;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px;margin-bottom:12px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.box{background:rgba(255,255,255,.06);border-radius:16px;padding:12px 8px;text-align:center;border:1px solid rgba(255,255,255,.08)}
.box small{display:block;color:#9ca3af;margin-bottom:6px;font-size:12px}.box strong{font-size:22px}
button{min-height:42px;border:none;border-radius:14px;font-size:14px;font-weight:bold;background:#14b8a6;color:#05201f;cursor:pointer;padding:8px 12px}
.btn-red{background:rgba(239,68,68,.18);color:#fecaca;border:1px solid rgba(239,68,68,.4)}
.btn-dark{background:rgba(255,255,255,.08);color:white;border:1px solid rgba(255,255,255,.12)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;table-layout:auto}
th,td{border-bottom:1px solid rgba(255,255,255,.12);padding:8px;text-align:left;vertical-align:middle}
th{color:#94a3b8;font-size:12px}
a{color:#5eead4;font-weight:bold;text-decoration:none}
.detailBox{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px;margin:8px 0}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:10;padding:18px;align-items:center;justify-content:center}
.modal{width:100%;max-width:460px;background:#102629;border-radius:24px;padding:20px;border:1px solid rgba(255,255,255,.15);max-height:88vh;overflow:auto}
@media(max-width:700px){.app{max-width:430px;padding:10px}.summary{grid-template-columns:1fr 1fr}table{font-size:11px}th,td{padding:6px}}

.statuspill{display:inline-block;padding:6px 10px;border-radius:999px;font-weight:bold;font-size:12px}
.pillgreen{background:rgba(34,197,94,.18);color:#86efac}.pillorange{background:rgba(250,204,21,.18);color:#fde68a}.pillgray{background:rgba(148,163,184,.18);color:#cbd5e1}
</style></head>
<body>
<div class="app">
<div class="badge">DISPATCH V12.2.8</div>
<h1>TACLAR Dispatch</h1>
<div class="subtitle">Suivi opérationnel — Groupage</div>

<div class="card">
<button onclick="render()">Actualiser</button>
<button class="btn-red" onclick="clearDispatch()">Effacer statut dispatch</button>
<p class="muted">Aucun montant n’est affiché ici.</p>
</div>

<div class="card">
<h2>Chauffeurs groupage</h2>
<table>
<thead><tr>
<th>Plaque</th><th>Chauffeur</th><th>Axe</th><th>Statut</th><th>À bord</th><th>Places</th><th>Début</th><th>Fin</th><th>Durée</th><th>Dernière info</th><th>Action</th>
</tr></thead>
<tbody id="rows"></tbody>
</table>
</div>
</div>

<div class="modal-bg" id="detailModal"><div class="modal">
<h2>Détail opérationnel</h2>
<div id="detailContent"></div>
<button class="btn-dark" onclick="closeDetail()">Fermer</button>
</div></div>


<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC_JNVVGrd2whXRGfHuOlShhmZfaLQFLfw",
  authDomain: "taclar-52e72.firebaseapp.com",
  projectId: "taclar-52e72",
  storageBucket: "taclar-52e72.firebasestorage.app",
  messagingSenderId: "501812718028",
  appId: "1:501812718028:web:45842bcde3db9049ec9569"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
var currentRows=[];
function statusFr(s){if(s==='service')return 'En service';if(s==='incident')return 'Incident';return 'Terminé'}
function pill(s){if(s==='service')return '<span class="statuspill pillgreen">En service</span>';if(s==='incident')return '<span class="statuspill pillorange">Incident</span>';return '<span class="statuspill pillgray">Terminé</span>'}
function getHidden(){try{return JSON.parse(localStorage.getItem('taclar_dispatch_hidden')||'[]')}catch(e){return []}}
function setHidden(h){localStorage.setItem('taclar_dispatch_hidden',JSON.stringify(h))}
function rowId(r){return [r.source||'',r.plate||'---',r.driver||'---',r.route||'---',r.start||'',r.end||'',r.updated||''].join('|')}
var cloudLiveRows=[];
function startFirebaseDispatch(){
  try{
    db.collection("groupage_live").onSnapshot(function(snapshot){
      cloudLiveRows=[];
      snapshot.forEach(function(doc){cloudLiveRows.push(doc.data())});
      render();
    });
  }catch(e){console.log("firebase dispatch error",e)}
}

function uniqueDispatchRows(rows){
  var map={};
  rows.forEach(function(r){
    var key=(r.sessionId||"")+"|"+(r.plate||"")+"|"+(r.driver||"")+"|"+(r.start||"");
    if(!map[key]) map[key]=r;
    else{
      var existing=map[key];
      if(existing.status==="closed" && r.status!=="closed") map[key]=r;
      else if((r.updated||"")>(existing.updated||"")) map[key]=r;
    }
  });
  return Object.values(map);
}

function getRows(){
  if(cloudLiveRows && cloudLiveRows.length){
    return uniqueDispatchRows(cloudLiveRows.map(function(x,i){
      return {
        source:"cloud-"+(x.sessionId||i),sessionId:x.sessionId||"",
        plate:x.plate||"---",
        driver:x.driver||"---",
        route:x.route||"---",
        status:x.status==="closed"?"closed":(x.status||"service"),
        onboard:Number(x.onboard||0),
        free:x.free==null?4:Number(x.free),
        start:x.start||"--:--",
        end:x.end||"--:--",
        duration:x.duration||(x.status==="closed"?"--":"En cours"),
        last:x.last||"",
        incident:x.incident||null,
        updated:x.updatedAtLocal||""
      }
    }));
  }
  var rows=[];
  try{
    var live=JSON.parse(localStorage.getItem('taclar_live')||'null');
    if(live && live.status!=='closed') rows.push({source:'live',plate:live.vehicle||'---',driver:live.driver||'---',route:live.route||'---',status:live.status||'closed',onboard:Number(live.onboard||0),free:live.free==null?4:Number(live.free),start:live.start||'--:--',end:'--:--',duration:'En cours',last:live.last||'',incident:live.incident||null,updated:live.updated||''});
  }catch(e){}
  try{
    var sessions=JSON.parse(localStorage.getItem('taclar_sessions')||'[]');
    sessions.forEach(function(s,i){rows.push({source:'session-'+i,plate:s.plate||'---',driver:s.driver||'---',route:s.route||'---',status:'closed',onboard:0,free:4,start:s.start||'--:--',end:s.end||s.time||'--:--',duration:s.duration||'--',last:'Session clôturée',incident:(s.incidents&&s.incidents.length)?s.incidents[s.incidents.length-1]:null,updated:s.end||s.time||''})});
  }catch(e){}
  return uniqueDispatchRows(rows);
}
function render(){
  var rowsEl=document.getElementById('rows'); var hidden=getHidden();
  currentRows=getRows().filter(function(r){return hidden.indexOf(rowId(r))===-1});
  rowsEl.innerHTML='';
  if(currentRows.length===0){rowsEl.innerHTML='<tr><td colspan="11">Aucune session active.</td></tr>';return;}
  currentRows.slice().reverse().forEach(function(row){
    var idx=currentRows.indexOf(row);
    var tr=document.createElement('tr');
    var info=row.last+(row.incident?' - '+row.incident.reason:'');
    tr.innerHTML=
      '<td><a href="#" onclick="showDetail('+idx+')">'+row.plate+'</a></td>'+
      '<td>'+row.driver+'</td><td>'+row.route+'</td><td>'+pill(row.status)+'</td>'+
      '<td>'+row.onboard+'/4</td><td>'+row.free+'</td><td>'+row.start+'</td><td>'+row.end+'</td><td>'+row.duration+'</td><td>'+info+'</td>'+
      '<td><button class="btn-dark" onclick="hideRow('+idx+')">Masquer</button></td>';
    rowsEl.appendChild(tr);
  });
}
function hideRow(i){var r=currentRows[i];if(!r)return;var h=getHidden();var id=rowId(r);if(h.indexOf(id)===-1)h.push(id);setHidden(h);render();}
function showDetail(i){
  var r=currentRows[i]; if(!r)return;
  var html='';
  html+='<div class="detailBox"><b>Plaque :</b> '+r.plate+'</div>';
  html+='<div class="detailBox"><b>Chauffeur :</b> '+r.driver+'</div>';
  html+='<div class="detailBox"><b>Axe :</b> '+r.route+'</div>';
  html+='<div class="detailBox"><b>Statut :</b> '+statusFr(r.status)+'</div>';
  html+='<div class="detailBox"><b>À bord :</b> '+r.onboard+'/4</div>';
  html+='<div class="detailBox"><b>Places libres :</b> '+r.free+'</div>';
  html+='<div class="detailBox"><b>Début :</b> '+r.start+'</div>';
  html+='<div class="detailBox"><b>Fin :</b> '+r.end+'</div>';
  html+='<div class="detailBox"><b>Durée :</b> '+r.duration+'</div>';
  html+='<div class="detailBox"><b>Dernière info :</b> '+r.last+'</div>';
  html+='<div class="detailBox"><b>Incident :</b> '+(r.incident?r.incident.reason:'Aucun')+'</div>';
  document.getElementById('detailContent').innerHTML=html;
  document.getElementById('detailModal').style.display='flex';
}
function closeDetail(){document.getElementById('detailModal').style.display='none'}

async function deleteLiveAll(){
  var total=0;
  while(true){
    var snap=await db.collection("groupage_live").limit(400).get();
    if(snap.empty)break;
    var batch=db.batch();
    snap.forEach(function(doc){batch.delete(doc.ref);total++;});
    await batch.commit();
    if(snap.size<400)break;
  }
  return total;
}

function clearDispatch(){if(confirm('Effacer le dernier statut dispatch et les lignes masquées ?')){localStorage.removeItem('taclar_live');localStorage.removeItem('taclar_dispatch_hidden');render();}}
render();startFirebaseDispatch();setInterval(render,3000);
</script>
</body></html>
